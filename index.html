<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學生社團報名系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>CAMPUS CLUBS</h1>
        <a href="admin.html" class="btn btn-outline btn-sm" style="width: auto">管理員登入 (Demo)</a>
    </header>

    <main class="container">
        <div class="search-bar">
            <!-- SVG Icon inline for better loading -->
            <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="搜尋社團名稱或介紹...">
        </div>

        <div class="club-grid" id="clubGrid">
            <!-- Clubs will be injected here by JS -->
        </div>
    </main>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="regModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">報名社團</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="regForm" onsubmit="submitRegistration(event)">
                <input type="hidden" id="clubId">
                <div class="form-group">
                    <label for="studentName">姓名</label>
                    <input type="text" id="studentName" required placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label for="studentId">學號</label>
                    <input type="text" id="studentId" required placeholder="請輸入學號">
                </div>
                <div class="form-group">
                    <label for="studentEmail">聯絡信箱</label>
                    <input type="email" id="studentEmail" required placeholder="請輸入 Email">
                </div>
                <div class="form-group">
                    <label for="studentPhone">手機號碼</label>
                    <input type="tel" id="studentPhone" required placeholder="請輸入手機號碼">
                </div>
                <!-- 針對本週無假金流的 mock 功能 -->
                <div class="form-group">
                    <label for="paymentInfo">匯款帳號末五碼 (選填，若有收取費用)</label>
                    <input type="text" id="paymentInfo" placeholder="例如：12345">
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">確認報名</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Alert Modal (for Success/Error) -->
    <div class="modal-overlay" id="alertModal" style="z-index: 1000;">
        <div class="modal" style="max-width: 300px; text-align: center;">
            <div class="modal-title" id="alertTitle" style="margin-bottom: 1rem;">通知</div>
            <p id="alertMessage" style="margin-bottom: 1.5rem; color: var(--text-muted);"></p>
            <button class="btn btn-primary" onclick="closeAlert()">確定</button>
        </div>
    </div>

    <script src="assets/js/db.js"></script>
    <script src="assets/js/user_app.js"></script>
</body>
</html>
